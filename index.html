<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Trademark Multilingual Notes</title>
  <meta name="description" content="Practical multilingual notes on Japanese trademark law for business discussions.">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="header-top">
        <div class="header-title">
          <h1>Trademark Multilingual Notes</h1>
          <p class="subtitle">Practical multilingual notes on Japanese trademark law for business discussions.</p>
        </div>

        <button
          id="menuBtn"
          class="menu-btn"
          type="button"
          aria-label="Open topic list"
          aria-expanded="false"
        >
          <span class="hamburger-icon" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
          </span>
        </button>
      </div>

      <div class="header-controls">
        <label class="control">
          <span>Language</span>
          <select id="languageSelect">
            <option value="ja">日本語</option>
            <option value="en">English</option>
            <option value="de">Deutsch</option>
            <option value="it">Italiano</option>
          </select>
        </label>

        <label class="control search-control">
          <span>Search</span>
          <input id="searchInput" type="search" placeholder="Search topics, terms, tags">
        </label>

        <button id="bookmarkFilterBtn" class="secondary-btn" type="button" aria-pressed="false">
          Bookmarks only
        </button>
      </div>
    </div>
  </header>

  <div id="sidebarOverlay" class="sidebar-overlay" aria-hidden="true"></div>

  <main class="layout">
    <aside id="sidebar" class="sidebar" aria-label="Topic list">
      <div class="sidebar-header">
        <span class="sidebar-title">Topics</span>
        <button
          id="sidebarCloseBtn"
          class="sidebar-close-btn"
          type="button"
          aria-label="Close topic list"
        >
          ✕
        </button>
      </div>

      <div class="bottom-sheet-handle" aria-hidden="true"></div>
      <div id="topicList" class="topic-list"></div>
    </aside>

    <section class="content">
      <article id="detailCard" class="detail-card">
        <p class="empty">Loading...</p>
      </article>
    </section>
  </main>

  <template id="topicItemTemplate">
    <button class="topic-item" type="button">
      <span class="topic-item-title"></span>
      <span class="topic-item-meta"></span>
    </button>
  </template>

  <script src="./app.js"></script>
</body>
</html>
